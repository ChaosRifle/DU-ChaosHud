          Nav:toggleBoosters()

    onActionStart:
      args: ['light']
      lua: |
          if unit.isAnyHeadlightSwitchedOn() then
              unit.switchOffHeadlights()
          else
              unit.switchOnHeadlights()
          end
          

    onActionStart:
      args: ['gear']
      lua: |
          gearExtended = not gearExtended
          if gearExtended then
              unit.deployLandingGears()
          else
              unit.retractLandingGears()
          end
          




